# Quant Trading System Configuration

[database]
url = "postgresql://postgres:postgres@127.0.0.1:5432/quant_trading"
max_connections = 20

[tushare]
token = ""
base_url = "http://api.tushare.pro"

[akshare]
base_url = "https://akshare.akfamily.xyz"

[data_source]
# Provider priority per market (first available wins)
# Valid: "tushare", "akshare", "yfinance"
cn_providers = ["tushare", "akshare"]
us_providers = ["yfinance"]
hk_providers = ["yfinance"]
# If true, never fetch from network — only read from local cache
cache_only = false

[llm]
api_url = "https://models.inference.ai.azure.com"
api_key = ""   # Set your GitHub PAT with Copilot access (or use GITHUB_TOKEN env var)
model = "gpt-4o"              # Or any model available via Copilot
temperature = 0.7
max_tokens = 10000
[trading]
# Default global rates (used as fallback)
commission_rate = 0.00025
stamp_tax_rate = 0.001
slippage_ticks = 1
initial_capital = 1000000.0

# Per-market fee overrides
[trading.fees.CN]
commission_rate = 0.00025    # 0.025%
stamp_tax_rate = 0.001       # 0.1% sell-side only (印花税)
slippage_ticks = 1

[trading.fees.US]
commission_rate = 0.001      # 0.1% (IBKR tiered)
stamp_tax_rate = 0.0         # No stamp tax
slippage_ticks = 1

[trading.fees.HK]
commission_rate = 0.0008     # 0.08%
stamp_tax_rate = 0.001       # 0.1% stamp duty (both sides)
slippage_ticks = 1

[risk]
# Maximum position concentration per stock (0.2 = 20%)
max_concentration = 0.2
# Maximum daily loss limit (0.05 = 5%)
max_daily_loss = 0.05
# Maximum drawdown limit (0.15 = 15%)
max_drawdown = 0.15
# Stop-loss per position (0.05 = 5% loss triggers auto-sell)
stop_loss_pct = 0.05
# Consecutive order failures to trip circuit breaker
circuit_breaker_failures = 5
# Auto-halt engine on max drawdown breach
halt_on_drawdown = true

[qmt]
# QMT Python bridge URL (qmt_bridge.py sidecar)
bridge_url = "http://127.0.0.1:18090"
# QMT trading account ID
account = ""
# Path to miniQMT userdata directory
qmt_path = ""

[server]
host = "0.0.0.0"
port = 8080

[sentiment]
# News collection interval in seconds (default: 3600 = 1 hour)
collect_interval_secs = 3600
# Symbols to track for automatic sentiment analysis
watch_symbols = ["600519.SH", "000858.SZ", "000001.SZ"]
# Max news items to fetch per symbol per cycle
max_news_per_symbol = 10
# Max LLM API calls per collection cycle (controls cost)
max_llm_calls_per_cycle = 50
# News data sources: "eastmoney", "sina"
news_sources = ["eastmoney", "sina"]
